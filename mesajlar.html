    <section class="chat-workspace">
      <aside class="chat-sidebar-panel" id="chatSidebarPanel">

          <div>
            <h3>Söhbətlər</h3>
            <p class="muted small-text" id="chatSidebarNote">Söhbət seçin</p>

          <button id="cancelEditBtn" class="btn btn-outline btn-small" type="button">Ləğv et</button>
        </div>

        <div class="chat-composer">
          <input id="chatInput" type="text" placeholder="Mesajınızı yazın...">
          <button class="btn" id="sendChatBtn" type="button">
            <i class="fa-solid fa-paper-plane"></i> Göndər
