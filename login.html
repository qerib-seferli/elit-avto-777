<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giriş / Qeydiyyat - ELİT AVTO 777</title>

                          <link rel="manifest" href="./site.webmanifest">
                          <meta name="theme-color" content="#0b0f19">
                          <link rel="apple-touch-icon" href="./foto/icon-192.png">
                          <meta name="apple-mobile-web-app-capable" content="yes">
                          <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
                          <meta name="apple-mobile-web-app-title" content="ELIT AVTO">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="login">
  <header class="site-header">
    <div class="container header-row compact-header">
      <a class="brand" href="index.html">
        <img class="brand-logo" src="foto/elit_avto_777_logo.png" alt="ELİT AVTO 777">
        <div><h2>ELİT AVTO 777</h2><p>Giriş və qeydiyyat</p></div>
      </a>
      <a href="index.html" class="btn btn-outline btn-small">Əsas</a>
    </div>
  </header>

  <main class="page auth-page">
    <div class="container auth-shell">
      <section class="form-card auth-card-pro">
        <div class="auth-tabs split-tabs">
          <button class="btn" id="tabLogin" type="button">Giriş</button>
          <button class="btn btn-outline" id="tabRegister" type="button">Qeydiyyat</button>
        </div>

        <form id="loginForm" class="hidden compact-form-stack">
          <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="mail@example.com" required></div>
          <div class="field"><label>Şifrə</label><input type="password" id="loginPassword" placeholder="******" required></div>
          <div class="filter-actions single-action"><button class="btn full-btn" type="submit">Daxil ol</button></div>
        </form>

        <form id="registerForm" class="hidden compact-form-stack">
          <div class="field-inline mobile-single-inline">
            <div class="field"><label>Ad</label><input type="text" id="regName" required></div>
            <div class="field"><label>Soyad</label><input type="text" id="regSurname" required></div>
          </div>
          <div class="field"><label>Email</label><input type="email" id="regEmail" placeholder="mail@example.com" required></div>
          <div class="field"><label>Şifrə</label><input type="password" id="regPassword" placeholder="******" required></div>
          <div class="filter-actions single-action"><button class="btn full-btn" type="submit">Qeydiyyatdan keç</button></div>
          <p class="muted small-text">Telefon nömrəsi qeydiyyatda yox, sonradan profil bölməsində əlavə olunur.</p>
        </form>

        <p id="authMsg" class="muted auth-message"></p>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
