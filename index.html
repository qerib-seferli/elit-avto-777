            <div>

              <input id="filterPriceMax" type="number" placeholder="120000">
            </div>
          </div>
          <div class="field">
            <label>Valyuta</label>
            <select id="filterCurrency">
              <option value="">Hamısı</option>
              <option value="AZN">AZN</option>

            </select>
          </div>
          <div class="field">
            <label>Vəziyyət</label>
            <div class="switches">
              <label class="chip"><input type="radio" name="condition" value="" checked> Hamısı</label>
              <label class="chip"><input type="radio" name="condition" value="Yeni"> Yeni</label>
              <label class="chip"><input type="radio" name="condition" value="Sürülmüş"> Sürülmüş</label>
            </div>
          </div>
          <div class="field">
            <label>Əlavələr</label>
            <div class="switches">
              <label class="chip"><input type="checkbox" id="filterCredit"> Kredit</label>
              <label class="chip"><input type="checkbox" id="filterBarter"> Barter</label>
            </div>
          </div>
          <div class="field">
            <label>Yanacaq</label>
            <select id="filterFuel">
              <option value="">Hamısı</option>
              <option>Benzin</option>
              <option>Dizel</option>
              <option>Qaz</option>
              <option>Hibrid</option>
              <option>Elektrik</option>
            </select>
          </div>
          <div class="field">
            <label>Rəng</label>
            <select id="filterColor">
              <option value="">Hamısı</option>
              <option value="Qara">⚫ Qara</option>
              <option value="Ağ">⚪ Ağ</option>
              <option value="Qırmızı">🔴 Qırmızı</option>
              <option value="Gümüşü">⚪ Gümüşü</option>
              <option value="Boz">⚫ Boz</option>
              <option value="Mavi">🔵 Mavi</option>
            </select>
          </div>
        </div>
        <div class="filter-actions">
          <button class="btn" id="applyFilters"><i class="fa-solid fa-magnifying-glass"></i> Axtar</button>
          <button class="btn btn-outline" id="resetFilters">Sıfırla</button>
        </div>
